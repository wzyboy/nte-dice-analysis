name: CI

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/ci.yml'
      - '.python-version'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'src/**'
      - 'tests/**'
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - '.python-version'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Run pytest
        run: uv run --locked --group dev pytest
