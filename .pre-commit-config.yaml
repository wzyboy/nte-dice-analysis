repos:
  - repo: local
    hooks:
      - id: ruff-isort
        name: ruff check --select I --fix
        entry: ruff check --select I --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types_or: [python, pyi]
